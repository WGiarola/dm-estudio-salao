<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Exclusivo | D&M Estúdio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bronze: { 400: '#c5a880', 500: '#b39266' },
                        stone: { 950: '#0c0a09' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght=200;300;400;500;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen flex flex-col justify-between">

    <header class="text-center py-14 border-b border-stone-900/60 backdrop-blur-md sticky top-0 bg-stone-950/90 z-40">
        <h1 class="text-3xl font-extralight tracking-[0.25em] uppercase text-bronze-400">D&M Estúdio</h1>
        <p class="text-[10px] tracking-[0.2em] text-stone-400 uppercase mt-2.5 font-medium">Experiência Exclusiva de Beleza</p>
    </header>

    <main class="max-w-md w-full mx-auto px-6 py-10 flex-grow">
        <form id="formAgendamento" class="space-y-8">
            
            <div class="space-y-3">
                <label class="block text-xs font-semibold uppercase tracking-[0.15em] text-stone-400">1. Selecione o Serviço</label>
                <select id="servicoSelecionado" required class="w-full bg-stone-900/80 border border-stone-800 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-bronze-400 transition text-stone-200 cursor-pointer">
                    <option value="" disabled selected>Carregando serviços...</option>
                </select>
            </div>

            <div class="space-y-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.15em] text-stone-400">2. Seus Dados de Contato</label>
                <input type="text" id="nomeCliente" placeholder="Nome completo" required class="w-full bg-stone-900/50 border border-stone-800 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-bronze-400 transition placeholder-stone-600 font-light">
                <input type="tel" id="telefoneCliente" placeholder="WhatsApp com DDD (ex: 11999999999)" required class="w-full bg-stone-900/50 border border-stone-800 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-bronze-400 transition placeholder-stone-600 font-light">
            </div>

            <div class="space-y-4">
                <label class="block text-xs font-semibold uppercase tracking-[0.15em] text-stone-400">3. Escolha a Data</label>
                <input type="date" id="dataEscolhida" required class="w-full bg-stone-900/80 border border-stone-800 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-bronze-400 transition text-stone-300 cursor-pointer">
                
                <div id="wrapperAgendaDisponivel" class="hidden space-y-3 mt-4">
                    <span class="block text-[11px] font-medium text-stone-500 tracking-wider">Horários livres para esta data:</span>
                    <div id="containerHorarios" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>

            <div id="cartaoDetalhes" class="hidden bg-stone-900/40 border border-stone-900 p-5 rounded-2xl text-center backdrop-blur-sm"></div>

            <button type="submit" class="w-full bg-bronze-500 hover:bg-bronze-400 text-stone-950 font-semibold tracking-[0.2em] uppercase text-[11px] py-5 rounded-xl transition duration-300 flex items-center justify-center gap-2.5">
                <i class="fa-brands fa-whatsapp text-sm"></i> Confirmar no WhatsApp
            </button>
        </form>
    </main>

    <footer class="text-center py-8 border-t border-stone-900 text-[9px] text-stone-600 tracking-[0.15em] uppercase font-light">
        &copy; 2026 D&M Estúdio &bull; Gestão Digital
    </footer>

    <script>
        // CONFIGURAÇÃO DA CONEXÃO DA NUVEM (SUPABASE)
        const SUPABASE_URL = "https://uglhbnbyloyeivpsrwvg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jLcnt4fC899DcVrrB2SGZw_kWu3Br-A"; 

        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };

        let horaSelecionadaGlobal = '';
        let idHorarioGlobal = '';

        async function carregarServicos() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/servicos?order=nome.asc`, { headers });
                const servicos = await res.json();
                const select = document.getElementById('servicoSelecionado');
                select.innerHTML = '<option value="" disabled selected>Escolha o procedimento ideal...</option>';
                
                servicos.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = `${s.nome}|${s.preco}`;
                    opt.textContent = `${s.nome} — R$ ${parseFloat(s.preco).toFixed(2).replace('.', ',')}`;
                    select.appendChild(opt);
                });
            } catch (err) { console.error("Erro ao carregar serviços:", err); }
        }

        document.getElementById('dataEscolhida').addEventListener('change', async function() {
            const dataFiltro = this.value;
            const container = document.getElementById('containerHorarios');
            container.innerHTML = '<p class="text-xs text-stone-500 col-span-3 py-3 text-center">Buscando horários...</p>';
            document.getElementById('wrapperAgendaDisponivel').classList.remove('hidden');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/horarios_livres?data=eq.${dataFiltro}&order=hora.asc`, { headers });
                const disponiveisNoDia = await res.json();
                container.innerHTML = '';

                if (disponiveisNoDia.length === 0) {
                    container.innerHTML = '<p class="text-xs text-stone-500 col-span-3 py-3 text-center font-light">Não há horários disponíveis para esta data.</p>';
                    document.getElementById('cartaoDetalhes').classList.add('hidden');
                    horaSelecionadaGlobal = '';
                    return;
                }

                disponiveisNoDia.forEach(item => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    const horaFormatada = item.hora.substring(0, 5);
                    btn.className = 'bg-stone-900 border border-stone-800 text-stone-300 text-xs py-3.5 rounded-xl hover:border-bronze-400 transition font-light';
                    btn.textContent = horaFormatada;
                    
                    btn.addEventListener('click', function() {
                        container.querySelectorAll('button').forEach(b => b.classList.remove('border-bronze-400', 'text-bronze-400'));
                        this.classList.add('border-bronze-400', 'text-bronze-400');
                        horaSelecionadaGlobal = horaFormatada;
                        idHorarioGlobal = item.id;
                        atualizarResumo();
                    });
                    container.appendChild(btn);
                });
            } catch (err) { console.error(err); }
        });

        document.getElementById('servicoSelecionado').addEventListener('change', function() {
            if (horaSelecionadaGlobal) atualizarResumo();
        });

        function atualizarResumo() {
            const servicoValue = document.getElementById('servicoSelecionado').value;
            if (!servicoValue || !horaSelecionadaGlobal) return;
            const [nomeServico, precoServico] = servicoValue.split('|');
            const cartao = document.getElementById('cartaoDetalhes');
            cartao.innerHTML = `
                <div class="text-left space-y-1.5 font-light text-xs text-stone-300">
                    <p><b class="text-stone-500 uppercase tracking-wider text-[10px]">Procedimento:</b> ${nomeServico}</p>
                    <p><b class="text-stone-500 uppercase tracking-wider text-[10px]">Valor:</b> <span class="text-bronze-400 font-medium">R$ ${parseFloat(precoServico).toFixed(2).replace('.', ',')}</span></p>
                    <p><b class="text-stone-500 uppercase tracking-wider text-[10px]">Horário:</b> ${horaSelecionadaGlobal}</p>
                </div>
            `;
            cartao.classList.remove('hidden');
        }

        document.getElementById('formAgendamento').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!horaSelecionadaGlobal) return alert("Selecione um horário.");

            const dataEscolhida = document.getElementById('dataEscolhida').value;
            const nomeCliente = document.getElementById('nomeCliente').value;
            const telefoneCliente = document.getElementById('telefoneCliente').value;
            const [nomeServico, precoServico] = document.getElementById('servicoSelecionado').value.split('|');

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/agendamentos`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ cliente: nomeCliente, whatsapp: telefoneCliente, servico: nomeServico, preco: precoServico, data: dataEscolhida, hora: horaSelecionadaGlobal })
                });

                await fetch(`${SUPABASE_URL}/rest/v1/horarios_livres?id=eq.${idHorarioGlobal}`, {
                    method: 'DELETE',
                    headers
                });

                const dataFormatada = dataEscolhida.split('-').reverse().join('/');
                const textoMensagem = `Olá, ${nomeCliente}! ✨\n\nSeu agendamento no *D&M Estúdio* foi realizado com sucesso!\n\n📋 *Detalhes da Reserva:*\n💇‍♀️ *Trabalho:* ${nomeServico}\n📅 *Data:* ${dataFormatada}\n⏰ *Horário:* ${horaSelecionadaGlobal}\n💳 *Valor:* R$ ${parseFloat(precoServico).toFixed(2).replace('.', ',')}\n\nSeu horário foi reservado em nosso sistema. Nos vemos em breve! ❤️`;

                let telefoneLimpo = telefoneCliente.replace(/\D/g, '');
                if (telefoneLimpo.length > 0 && !telefoneLimpo.startsWith('55')) telefoneLimpo = '55' + telefoneLimpo;

                alert("Agendamento efetuado com sucesso!");
                window.open(`https://api.whatsapp.com/send?phone=${telefoneLimpo}&text=${encodeURIComponent(textoMensagem)}`, '_blank');

                this.reset();
                document.getElementById('wrapperAgendaDisponivel').classList.add('hidden');
                document.getElementById('cartaoDetalhes').classList.add('hidden');
                horaSelecionadaGlobal = '';
            } catch (err) { alert("Erro ao agendar. Tente novamente."); }
        });

        carregarServicos();
    </script>
</body>
</html>
